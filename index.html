<!DOCTYPE html>

<head>
<meta charset="utf-8">

<title>NQI Software Archive</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f7f8fa;color:#1a1a2e;line-height:1.5}
header{background:linear-gradient(135deg,#1a1a2e,#16213e);color:#fff;padding:2rem 1.5rem}
header h1{font-size:1.75rem;margin-bottom:.25rem}
header p{opacity:.8;font-size:.95rem}
.controls{display:flex;flex-wrap:wrap;gap:.75rem;padding:1.25rem 1.5rem;background:#fff;border-bottom:1px solid #e2e6ea;position:sticky;top:0;z-index:10}
input[type=search]{flex:1;min-width:180px;padding:.5rem .75rem;border:1px solid #ced4da;border-radius:6px;font-size:.9rem}
select{padding:.5rem .75rem;border:1px solid #ced4da;border-radius:6px;font-size:.9rem;background:#fff}
.badge{display:inline-block;padding:.2em .55em;border-radius:4px;font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem;padding:1.5rem}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.07);padding:1.25rem;display:flex;flex-direction:column;gap:.6rem;transition:box-shadow .15s}
.card:hover{box-shadow:0 4px 16px rgba(0,0,0,.12)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem}
.card h2{font-size:1.05rem;font-weight:700}
.card h2 a{color:#1a1a2e;text-decoration:none}
.card h2 a:hover{color:#0066cc}
.tagline{font-size:.85rem;color:#555;font-style:italic}
.desc{font-size:.88rem;color:#333}
.meta{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:.3rem}
.center-badge{background:#e8f0fe;color:#1a56db}
.type-badge{background:#e6f9f0;color:#0a7c42}
.status-active{background:#d4edda;color:#155724}
.status-pending{background:#fff3cd;color:#856404}
.paper-link{font-size:.8rem;margin-top:.2rem}
.paper-link a{color:#0066cc;text-decoration:none}
.paper-link a:hover{text-decoration:underline}
.empty{grid-column:1/-1;text-align:center;padding:3rem;color:#888}
.stats{padding:.5rem 1.5rem;font-size:.82rem;color:#666;background:#fff;border-bottom:1px solid #e2e6ea}
</style>
</head>

<script>
(function(){
const data=JSON.parse(document.getElementById('data').textContent);
const grid=document.getElementById('grid');
const stats=document.getElementById('stats');
const qEl=document.getElementById('q');
const fCenter=document.getElementById('fCenter');
const fType=document.getElementById('fType');
const fStatus=document.getElementById('fStatus');

function center_color(c){
  const m={C2QA:'#6610f2',SQMS:'#e83e8c','Q-NEXT':'#fd7e14',QSA:'#20c997',QSC:'#0d6efd'};
  return m[c]||'#6c757d';
}

function render(items){
  stats.textContent=`Showing ${items.length} of ${data.length} entries`;
  if(!items.length){grid.innerHTML='<div class="empty">No entries match your filters.</div>';return;}
  grid.innerHTML=items.map(d=>{
    const centers=(d.centers||[]).map(c=>`<span class="badge center-badge" style="background:${center_color(c)}22;color:${center_color(c)}">${c}</span>`).join(' ');
    const type=d.type?`<span class="badge type-badge">${d.type}</span>`:'';
    const status=d.status?`<span class="badge status-${d.status}">${d.status}</span>`:'';
    const paper=d.paper&&d.paper.arxiv?`<div class="paper-link">📄 <a href="https://arxiv.org/abs/${d.paper.arxiv}" target="_blank" rel="noopener">${d.paper.title||'arXiv:'+d.paper.arxiv}</a></div>`:'';
    return `<div class="card" data-id="${d.id}">
      <div class="card-top"><h2><a href="${d.url}" target="_blank" rel="noopener">${d.name}</a></h2>${status}</div>
      ${d.tagline?`<div class="tagline">${d.tagline}</div>`:''}
      ${d.description?`<div class="desc">${d.description}</div>`:''}
      <div class="meta">${centers}${type}</div>
      ${paper}
    </div>`;
  }).join('');
}

function filter(){
  const q=qEl.value.toLowerCase();
  const c=fCenter.value;
  const t=fType.value;
  const s=fStatus.value;
  render(data.filter(d=>{
    if(c&&!(d.centers||[]).includes(c))return false;
    if(t&&d.type!==t)return false;
    if(s&&d.status!==s)return false;
    if(q){
      const hay=[d.name,d.tagline,d.description,...(d.topics||[])].join(' ').toLowerCase();
      if(!hay.includes(q))return false;
    }
    return true;
  }));
}

[qEl,fCenter,fType,fStatus].forEach(el=>el.addEventListener('input',filter));
function analyze(){
  const byCenter={};
  data.forEach(d=>(d.centers||[]).forEach(c=>{byCenter[c]=(byCenter[c]||0)+1;}));
}
render(data);
analyze();
})();
</script>
